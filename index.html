<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navigasi Gardu</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0284c7">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-gray-100 font-sans pb-10">

    <header class="bg-sky-600 text-white p-4 shadow-md text-center sticky top-0 z-50">
        <h1 class="text-xl font-bold">🗺️ Navigasi Gardu Lapangan</h1>
        <p class="text-xs opacity-90">Pencarian Offline 100+ Gardu</p>
    </header>

    <main class="max-w-md mx-auto p-4 space-y-4">
        
        <div class="flex justify-between items-center">
            <span class="text-xs text-gray-500 font-medium" id="totalInfo">Memuat data...</span>
            <button id="btnToggleForm" class="bg-blue-100 text-blue-700 text-xs font-bold px-3 py-1.5 rounded-lg hover:bg-blue-200 transition">
                ➕ Tambah Gardu Baru
            </button>
        </div>

        <div id="formContainer" class="bg-white p-5 rounded-xl shadow-md border border-gray-200 hidden">
            <h3 class="text-lg font-bold text-gray-800 mb-3 border-b pb-2">Form Data Gardu Baru</h3>
            <form id="formGardu" class="space-y-3 text-sm">
                <div>
                    <label class="block text-xs font-semibold text-gray-600 mb-1">No. Gardu *</label>
                    <input type="text" id="inGardu" required placeholder="Contoh: BT441" class="w-full p-2 border rounded-md uppercase">
                </div>
                <div class="grid grid-cols-2 gap-2">
                    <div>
                        <label class="block text-xs font-semibold text-gray-600 mb-1">Pelayanan</label>
                        <input type="text" id="inPelayanan" placeholder="UMUM/KHUSUS" class="w-full p-2 border rounded-md">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-gray-600 mb-1">Penyulang</label>
                        <input type="text" id="inPenyulang" placeholder="Nama Penyulang" class="w-full p-2 border rounded-md">
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-2">
                    <div>
                        <label class="block text-xs font-semibold text-gray-600 mb-1">Gardu Induk (GI)</label>
                        <input type="text" id="inGi" placeholder="Nama GI" class="w-full p-2 border rounded-md">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-gray-600 mb-1">Tipe / Jenis</label>
                        <input type="text" id="inTipeJenis" placeholder="KANTONG/PORTAL" class="w-full p-2 border rounded-md">
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-2">
                    <div>
                        <label class="block text-xs font-semibold text-gray-600 mb-1">GFD</label>
                        <input type="text" id="inGfd" placeholder="Ada/Tidak" class="w-full p-2 border rounded-md">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-gray-600 mb-1">Status RC</label>
                        <input type="text" id="inRc" placeholder="RC/NON RC" class="w-full p-2 border rounded-md">
                    </div>
                </div>
                <div>
                    <label class="block text-xs font-semibold text-gray-600 mb-1">Alamat</label>
                    <textarea id="inAlamat" placeholder="Nama jalan / patokan..." class="w-full p-2 border rounded-md h-16"></textarea>
                </div>
                <div>
                    <label class="block text-xs font-semibold text-gray-600 mb-1">Link Google Maps (Titik Lokasi)</label>
                    <input type="url" id="inLokasi" placeholder="https://maps.google.com/..." class="w-full p-2 border rounded-md">
                </div>
                <div class="flex space-x-2 pt-2">
                    <button type="submit" class="flex-1 bg-blue-600 text-white font-semibold p-2.5 rounded-lg hover:bg-blue-700">Simpan Data</button>
                    <button type="button" id="btnBatal" class="bg-gray-200 text-gray-700 p-2.5 rounded-lg hover:bg-gray-300">Batal</button>
                </div>
            </form>
        </div>

        <div>
            <input type="text" id="searchInput" placeholder="Ketik nomor gardu (Contoh: BT441)..." 
                class="w-full p-3 rounded-lg border border-gray-300 shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>

        <div id="garduCard" class="bg-white p-5 rounded-xl shadow-md border border-gray-200 hidden">
            <div class="flex justify-between items-center border-b pb-2 mb-3">
                <h2 id="garduId" class="text-2xl font-bold text-blue-700"></h2>
                <span id="jenisPelayanan" class="bg-green-100 text-green-800 text-xs font-semibold px-2.5 py-0.5 rounded"></span>
            </div>
            
            <div class="space-y-2 text-sm text-gray-700">
                <p><strong>Penyulang:</strong> <span id="penyulang"></span></p>
                <p><strong>Gardu Induk (GI):</strong> <span id="gi"></span></p>
                <p><strong>Tipe / Jenis:</strong> <span id="tipeJenis"></span></p>
                <p><strong>GFD / Status RC:</strong> <span id="gfdRc"></span></p>
                <p class="pt-2 border-t"><strong>Alamat:</strong></p>
                <p id="alamat" class="text-xs bg-gray-50 p-2 rounded italic text-gray-600"></p>
            </div>

            <a id="btnRute" href="#" target="_blank" 
                class="mt-5 block w-full bg-green-600 text-white text-center font-semibold py-3 rounded-lg shadow hover:bg-green-700 transition">
                🚀 Buka Rute Google Maps
            </a>
        </div>

        <div id="notFound" class="text-center text-gray-500 mt-8">
            Silakan ketik nomor gardu untuk melihat data lokasi.
        </div>
    </main>

    <script>
        let cloudDatabase = []; 
        let localDatabase = JSON.parse(localStorage.getItem('localAddedGardu')) || []; 
        let databaseGardu = []; 

        const GOOGLE_SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/1ewphUaFZSepFq8rLuExfNGJNCMyFoGZsDy3c7gzxDYU/export?format=csv&gid=0";

        function gabungkanDanRender() {
            databaseGardu = [...cloudDatabase, ...localDatabase];
            document.getElementById('totalInfo').innerText = `Total: ${databaseGardu.length} Gardu (${localDatabase.length} Baru lokal)`;
        }

        // Antisipasi jika cache lokal sebelumnya rusak karena sempat menyimpan HTML error login Google
        try {
            const cachedSheets = localStorage.getItem('cachedDatabaseGardu');
            if (cachedSheets && cachedSheets.startsWith('[')) { 
                cloudDatabase = JSON.parse(cachedSheets);
                gabungkanDanRender();
            }
        } catch(e) {
            localStorage.removeItem('cachedDatabaseGardu');
        }

        // Ambil data dari Google Sheets dengan proteksi deteksi HTML (Halaman Login)
        fetch(GOOGLE_SHEET_CSV_URL)
            .then(res => {
                const contentType = res.headers.get("content-type");
                if (contentType && contentType.includes("text/html")) {
                    throw new Error("Gagal! Google Sheets mengembalikan halaman Login HTML. Pastikan hak akses Google Sheets sudah diubah ke 'Siapa saja yang memiliki link'.");
                }
                return res.text();
            })
            .then(text => {
                const lines = text.split(/\r?\n/).filter(line => line.trim() !== "");
                if (lines.length > 0) {
                    const splitCSVRow = (row) => row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(val => val.replace(/^"|"\$/g, '').trim());
                    const headers = splitCSVRow(lines[0]);
                    
                    cloudDatabase = lines.slice(1).map(line => {
                        let obj = {};
                        const values = splitCSVRow(line);
                        headers.forEach((header, index) => {
                            obj[header] = values[index] || "";
                        });
                        return obj;
                    });

                    localStorage.setItem('cachedDatabaseGardu', JSON.stringify(cloudDatabase));
                    console.log("Sinkronisasi Google Sheets Sukses!");
                    gabungkanDanRender();
                }
            })
            .catch(err => {
                console.error("Gagal sinkronisasi Google Sheets:", err.message);
                gabungkanDanRender();
            });

        // Kontrol Tampilan Form
        const btnToggleForm = document.getElementById('btnToggleForm');
        const formContainer = document.getElementById('formContainer');
        const btnBatal = document.getElementById('btnBatal');

        btnToggleForm.addEventListener('click', () => formContainer.classList.toggle('hidden'));
        btnBatal.addEventListener('click', () => formContainer.classList.add('hidden'));

        // Simpan Data Baru Manual
        const formGardu = document.getElementById('formGardu');
        formGardu.addEventListener('submit', (e) => {
            e.preventDefault();
            const tipeJenisSplit = document.getElementById('inTipeJenis').value.split('/');
            
            const newGardu = {
                GARDU: document.getElementById('inGardu').value.toUpperCase().trim(),
                PELAYANAN: document.getElementById('inPelayanan').value.toUpperCase() || "-",
                PENYULANG: document.getElementById('inPenyulang').value.toUpperCase() || "-",
                GI: document.getElementById('inGi').value.toUpperCase() || "-",
                TIPE: (tipeJenisSplit[0] || "-").toUpperCase().trim(),
                JENIS: (tipeJenisSplit[1] || "-").toUpperCase().trim(),
                GFD: document.getElementById('inGfd').value.toUpperCase() || "-",
                STATUS_RC: document.getElementById('inRc').value.toUpperCase() || "-",
                ALAMAT: document.getElementById('inAlamat').value || "Alamat tidak tersedia.",
                TITIK_LOKASI: document.getElementById('inLokasi').value || "#"
            };

            if (databaseGardu.some(g => g.GARDU === newGardu.GARDU)) {
                alert(`Nomor Gardu ${newGardu.GARDU} sudah terdaftar!`);
                return;
            }

            localDatabase.push(newGardu);
            localStorage.setItem('localAddedGardu', JSON.stringify(localDatabase));
            gabungkanDanRender();

            formGardu.reset();
            formContainer.classList.add('hidden');
            
            document.getElementById('searchInput').value = newGardu.GARDU;
            document.getElementById('searchInput').dispatchEvent(new Event('input'));
            
            alert(`Gardu ${newGardu.GARDU} berhasil disimpan secara lokal!`);
        });

        // Logika Pencarian
        const searchInput = document.getElementById('searchInput');
        const garduCard = document.getElementById('garduCard');
        const notFound = document.getElementById('notFound');

        searchInput.addEventListener('input', (e) => {
            const keyword = e.target.value.toUpperCase().trim();
            const data = databaseGardu.find(g => g.GARDU && g.GARDU.toUpperCase() === keyword); 

            if (data) {
                // Membersihkan tanda petik ganda (") dari link lokasi jika ada akibat format CSV
                let bersihLokasi = (data.TITIK_LOKASI || "#").replace(/"/g, '').trim();

                document.getElementById('garduId').innerText = data.GARDU;
                document.getElementById('jenisPelayanan').innerText = data.PELAYANAN;
                document.getElementById('penyulang').innerText = data.PENYULANG;
                document.getElementById('gi').innerText = data.GI;
                document.getElementById('tipeJenis').innerText = `${data.TIPE} / ${data.JENIS}`;
                document.getElementById('gfdRc').innerText = `GFD: ${data.GFD} | RC: ${data.STATUS_RC}`;
                document.getElementById('alamat').innerText = data.ALAMAT;
                
                // Memasukkan link yang sudah bersih tanpa tanda petik ke tombol rute
                document.getElementById('btnRute').href = bersihLokasi;

                garduCard.classList.remove('hidden');
                notFound.classList.add('hidden');
            } else {
                garduCard.classList.add('hidden');
                notFound.classList.remove('hidden');
                notFound.innerText = keyword ? "Data gardu tidak ditemukan." : "Silakan ketik nomor gardu untuk melihat data lokasi.";
            }
        });

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => { navigator.serviceWorker.register('sw.js'); });
        }
    </script>
</body>
</html>
